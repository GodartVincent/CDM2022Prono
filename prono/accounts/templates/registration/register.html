{% extends "index.html" %}

{% block content %}      

<!--Register--> 
<div class="title">Register</div>
<div class="container">
    <div class="submitbutton">
        <form method="POST">
            {% csrf_token %}
            {{ register_form }}                    
            <button class="btn btn-primary" type="submit">Register</button>
        </form>
    </div>
	<p class="text-center">If you already have an account, <a href="{% url 'login' %}">login</a> instead.</p>
</div>

{% endblock %}
