<div class="question">
  <div class="question__string">
    {{forloop.counter}}
    -
    {{ question }}
  </div>
  <div class="question__content">
    <div class="question__actions">
      {% if question.isPronoOver %}
        {{ question.prono }}
      {% elif question.isfilled %}
        <form action="{% url 'polls:pronosticQuestion' question.id %}" class="question__form" method="post">
          {% csrf_token %}
          <input type="text" name="answer" class="question__choice" value="{{ question.prono }}" required="required">
          <button type="submit" class="button">Mettre à jour</button>
        </form>
      {% else %}
        <form action="{% url 'polls:pronosticQuestion' question.id %}" class="question__form" method="post">
          {% csrf_token %}
          <input type="text" name="answer" class="question__choice" required="required">
          <button type="submit" class="button">Valider</button>
        </form>
      {% endif %}
    </div>

    {% if question.isPronoOver and question.answer != 'None' %}
      <div class="question__result">
        {{ question.answer }}
        -
        {{ question.points }}
        points
      </div>
    {% endif %}

  </div>
</div>
